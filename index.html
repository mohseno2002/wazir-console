<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#071a2c">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="لوحة الوزير">
<title>لوحة قيادة الوزير</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Amiri:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg0:#04101d;
    --bg1:#071a2c;
    --bg2:#0c2840;
    --navy:#0e3b5c;
    --navy-soft:#1a6298;
    --cyan:#3fd0e0;
    --cyan-deep:#1c8ca0;
    --gold:#c9a24b;
    --gold-br:#ecc863;
    --gold-deep:#9c7a2c;
    --ink:#eaf3fb;
    --ink-soft:#9db6cc;
    --line:rgba(201,162,75,.22);
    --line-cool:rgba(63,208,224,.20);
    --glass:rgba(13,40,64,.55);
    --ok:#36d399;--warn:#e0a93b;--bad:#e8627a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow-x:hidden}
  body{
    font-family:'Cairo',sans-serif;color:var(--ink);
    background:var(--bg0);min-height:100vh;
    -webkit-font-smoothing:antialiased;position:relative;
    padding-bottom:env(safe-area-inset-bottom);
  }

  /* ===== Ambient animated background ===== */
  .bg-fx{position:fixed;inset:0;z-index:0;overflow:hidden;background:
    radial-gradient(1100px 620px at 78% -8%, rgba(63,208,224,.14), transparent 60%),
    radial-gradient(950px 600px at 12% 4%, rgba(201,162,75,.13), transparent 58%),
    linear-gradient(160deg,var(--bg1) 0%, var(--bg0) 60%, #03101c 100%);}
  .bg-fx canvas{position:absolute;inset:0;width:100%;height:100%;opacity:.55}
  .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
    box-shadow:inset 0 0 240px rgba(0,0,0,.55)}

  .shell{position:relative;z-index:2;max-width:1240px;margin:0 auto;padding:0 18px}

  /* ===== Hero header ===== */
  .hero{padding:calc(env(safe-area-inset-top) + 30px) 0 14px;text-align:center;position:relative}
  .seal{width:96px;height:96px;margin:0 auto 16px;position:relative}
  .seal .ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--gold);
    box-shadow:0 0 0 1px rgba(201,162,75,.25) inset, 0 0 34px rgba(201,162,75,.25);
    animation:spin 38s linear infinite}
  .seal .ring2{position:absolute;inset:9px;border-radius:50%;border:1px dashed rgba(63,208,224,.5);
    animation:spin 26s linear infinite reverse}
  .seal .core{position:absolute;inset:18px;border-radius:50%;
    background:radial-gradient(circle at 50% 32%, #114063, #061a2b 78%);
    display:grid;place-items:center;border:1px solid rgba(236,200,99,.4)}
  .seal svg{width:42px;height:42px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .hero h1{font-size:30px;font-weight:900;letter-spacing:.5px;
    background:linear-gradient(180deg,#fff, #cfe6f5 55%, var(--gold-br));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 2px 18px rgba(63,208,224,.18)}
  .hero .ar-line{display:flex;align-items:center;justify-content:center;gap:14px;margin:12px auto 0;max-width:520px}
  .hero .ar-line .ln{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .hero .ar-line .gem{width:9px;height:9px;transform:rotate(45deg);background:var(--gold-br);box-shadow:0 0 12px var(--gold-br)}
  .hero .subtitle{font-family:'Amiri',serif;font-size:16px;color:var(--ink-soft);margin-top:4px;letter-spacing:.3px}

  .statusbar{display:flex;align-items:center;justify-content:center;gap:10px;margin:16px auto 0;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;
    background:var(--glass);border:1px solid var(--line);padding:7px 13px;border-radius:999px;
    backdrop-filter:blur(8px);color:var(--ink-soft)}
  .pill .d{width:8px;height:8px;border-radius:50%;background:var(--ink-soft)}
  .pill .d.live{background:var(--ok);box-shadow:0 0 0 0 rgba(54,211,153,.6);animation:beat 2.2s infinite}
  .pill .d.off{background:var(--bad)}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(54,211,153,.5)}70%{box-shadow:0 0 0 7px rgba(54,211,153,0)}100%{box-shadow:0 0 0 0 rgba(54,211,153,0)}}
  .pill .mono{font-family:'JetBrains Mono',monospace}

  /* ===== Section label ===== */
  .sec{display:flex;align-items:center;gap:12px;margin:30px 0 16px}
  .sec h2{font-size:13.5px;font-weight:700;color:var(--gold-br);letter-spacing:1.4px;white-space:nowrap}
  .sec .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--line-cool),transparent)}
  .sec .count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);
    border:1px solid var(--line);padding:2px 9px;border-radius:7px}

  /* ===== App grid ===== */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:18px;padding-bottom:46px}
  .tile{position:relative;border-radius:22px;padding:22px;cursor:pointer;overflow:hidden;
    background:linear-gradient(160deg, rgba(18,52,82,.72), rgba(8,26,44,.78));
    border:1px solid var(--line-cool);
    box-shadow:0 18px 40px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.05);
    backdrop-filter:blur(10px);
    transition:transform .25s cubic-bezier(.2,.7,.3,1), box-shadow .25s, border-color .25s;
    display:flex;flex-direction:column;min-height:196px;
    transform:translateY(0)}
  .tile::before{content:"";position:absolute;inset:-1px;border-radius:22px;padding:1px;
    background:linear-gradient(140deg, rgba(63,208,224,.5), transparent 40%, transparent 70%, rgba(201,162,75,.5));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;opacity:.5;transition:opacity .25s}
  .tile::after{content:"";position:absolute;top:-40%;left:-30%;width:60%;height:180%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent);
    transform:rotate(18deg) translateX(-120%);transition:transform .7s ease;pointer-events:none}
  .tile:hover{transform:translateY(-6px);border-color:rgba(63,208,224,.5);
    box-shadow:0 26px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(63,208,224,.18), inset 0 1px 0 rgba(255,255,255,.07)}
  .tile:hover::before{opacity:1}
  .tile:hover::after{transform:rotate(18deg) translateX(320%)}
  .tile:active{transform:translateY(-2px) scale(.992)}

  .t-glow{position:absolute;inset:0;opacity:.0;transition:opacity .25s;
    background:radial-gradient(420px 200px at 80% -10%, var(--gw,rgba(63,208,224,.18)), transparent 60%)}
  .tile:hover .t-glow{opacity:1}

  .t-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;z-index:2}
  .t-ico{width:58px;height:58px;flex:0 0 58px;border-radius:17px;display:grid;place-items:center;color:#fff;
    box-shadow:0 10px 24px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.25);position:relative}
  .t-ico svg{width:31px;height:31px}
  .t-ico .sheen{position:absolute;inset:0;border-radius:17px;background:linear-gradient(160deg,rgba(255,255,255,.30),transparent 55%)}
  .t-tag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--gold-br);
    border:1px solid var(--line);background:rgba(201,162,75,.08);padding:3px 9px;border-radius:8px;white-space:nowrap}

  .t-name{font-size:18px;font-weight:800;color:#fff;margin-top:16px;line-height:1.3;position:relative;z-index:2}
  .t-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.7;margin-top:8px;flex:1;position:relative;z-index:2}
  .t-foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;position:relative;z-index:2}
  .t-enter{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;color:var(--cyan);}
  .t-enter svg{width:17px;height:17px;transition:transform .25s}
  .tile:hover .t-enter svg{transform:translateX(-6px)}
  .t-pop{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:var(--ink-soft);
    border:1px solid var(--line-cool);background:rgba(8,26,44,.5);transition:.2s}
  .t-pop:hover{color:var(--cyan);border-color:var(--cyan)}
  .t-pop svg{width:16px;height:16px}

  footer{position:relative;z-index:2;text-align:center;padding:14px 18px calc(env(safe-area-inset-bottom) + 26px);color:var(--ink-soft);font-size:12px;line-height:1.9}
  footer .sig{font-family:'Amiri',serif;font-size:15px;color:var(--gold-br);font-weight:700}
  footer .ln{width:130px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 12px}
  footer .build{font-family:'JetBrains Mono',monospace;font-size:10px;opacity:.6;margin-top:6px}

  /* ===== Viewer (iframe full screen) ===== */
  .viewer{position:fixed;inset:0;z-index:60;background:var(--bg0);display:flex;flex-direction:column;
    transform:translateY(100%);transition:transform .42s cubic-bezier(.2,.8,.2,1);visibility:hidden}
  .viewer.open{transform:translateY(0);visibility:visible}
  .v-bar{display:flex;align-items:center;gap:12px;
    padding:calc(env(safe-area-inset-top) + 9px) 14px 9px;
    background:linear-gradient(135deg,var(--navy) 0%, #061a2b 100%);
    border-bottom:1.5px solid var(--gold);box-shadow:0 6px 20px rgba(0,0,0,.45);z-index:2}
  .v-back{display:inline-flex;align-items:center;gap:8px;font-family:'Cairo';font-size:14px;font-weight:700;
    color:#fff;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);
    padding:9px 14px;border-radius:11px;cursor:pointer;transition:.18s}
  .v-back:hover{background:rgba(255,255,255,.18)}
  .v-back svg{width:17px;height:17px}
  .v-title{flex:1;min-width:0;display:flex;align-items:center;gap:10px}
  .v-dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px}
  .v-name{font-size:15px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .v-ext{display:inline-flex;align-items:center;gap:7px;color:#cfe6f5;background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.14);padding:8px 12px;border-radius:10px;font-size:12.5px;font-weight:700;
    text-decoration:none;cursor:pointer;transition:.18s;white-space:nowrap}
  .v-ext:hover{background:rgba(255,255,255,.16)}
  .v-ext svg{width:15px;height:15px}
  .v-stage{flex:1;position:relative;background:#0a1722}
  .v-stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff}
  .v-load{position:absolute;inset:0;display:grid;place-items:center;background:var(--bg0);z-index:3;transition:opacity .3s}
  .v-load.hide{opacity:0;pointer-events:none}
  .spinner{width:54px;height:54px;border-radius:50%;border:3px solid rgba(63,208,224,.18);
    border-top-color:var(--cyan);animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .v-load .lbl{position:absolute;margin-top:90px;font-size:13px;color:var(--ink-soft);font-weight:600}

  @media (max-width:560px){
    .hero h1{font-size:24px}
    .grid{grid-template-columns:1fr 1fr;gap:12px}
    .tile{padding:16px;min-height:172px;border-radius:18px}
    .t-ico{width:48px;height:48px;flex-basis:48px;border-radius:14px}
    .t-ico svg{width:25px;height:25px}
    .t-name{font-size:14.5px;margin-top:12px}
    .t-desc{display:none}
    .t-tag{display:none}
    .v-name{font-size:13.5px}
  }
  @media (max-width:380px){.grid{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){
    .seal .ring,.seal .ring2{animation:none}
    .tile,.tile::after,.t-enter svg{transition:none}
  }
</style>
</head>
<body>

<div class="bg-fx"><canvas id="fx"></canvas></div>
<div class="vignette"></div>

<div class="shell">
  <header class="hero">
    <div class="seal" aria-hidden="true">
      <div class="ring"></div><div class="ring2"></div>
      <div class="core">
        <svg viewBox="0 0 48 48" fill="none">
          <path d="M5 31h38M5 31c4.5-3.4 9-3.4 13.5 0s9 3.4 13.5 0 9-3.4 11 0" stroke="#ecc863" stroke-width="2" stroke-linecap="round"/>
          <rect x="10" y="13" width="4" height="15" rx="1" fill="#ecc863"/>
          <rect x="18.5" y="13" width="4" height="15" rx="1" fill="#3fd0e0"/>
          <rect x="27" y="13" width="4" height="15" rx="1" fill="#3fd0e0"/>
          <rect x="34" y="13" width="4" height="15" rx="1" fill="#ecc863"/>
          <path d="M8 13h32l-4.5-5.5H12.5z" fill="#ecc863"/>
          <circle cx="24" cy="10.5" r="1.6" fill="#04101d"/>
        </svg>
      </div>
    </div>
    <h1>لوحة قيادة الوزير</h1>
    <div class="ar-line"><span class="ln"></span><span class="gem"></span><span class="ln"></span></div>
    <div class="subtitle">منظومة التحوّل الرقمي لقطاع الموارد المائية والري</div>

    <div class="statusbar">
      <span class="pill"><span class="d live" id="connDot"></span><span id="connTxt">متصل</span></span>
      <span class="pill"><span class="mono" id="clock">--:--</span></span>
      <span class="pill"><span class="mono" id="dateAr"></span></span>
    </div>
  </header>

  <div class="sec">
    <h2>المنظومات الرقمية</h2>
    <div class="ln"></div>
    <span class="count" id="appCount"></span>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <div class="ln"></div>
    <div class="sig">م. محسن عبد الرشيد محمد الشامي</div>
    <div class="build" id="build"></div>
  </footer>
</div>

<!-- Viewer -->
<div class="viewer" id="viewer">
  <div class="v-bar">
    <button class="v-back" id="vBack"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 18l6-6-6-6M19 12H5"/></svg><span>عودة</span></button>
    <div class="v-title"><span class="v-dot" id="vDot"></span><span class="v-name" id="vName"></span></div>
    <a class="v-ext" id="vExt" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6M20 4l-9 9M19 13v6H5V5h6"/></svg><span>نافذة</span></a>
  </div>
  <div class="v-stage">
    <div class="v-load" id="vLoad"><div class="spinner"></div><div class="lbl" id="vLoadLbl">جارٍ فتح المنظومة…</div></div>
    <iframe id="vFrame" title="منظومة" allow="fullscreen; geolocation; clipboard-read; clipboard-write"></iframe>
  </div>
</div>

<script>
"use strict";

/* ===== سجل المنظومات ===== */
var APPS = [
  { id:"nile", name:"التوأم الرقمي للنيل", tag:"NILE",
    url:"https://mohseno2002.github.io/Nile-river/",
    icon:"wave", c1:"#1a6298", c2:"#0c3a5c",
    desc:"تليمتري حيّ لـ34 محطة، منحنيات JICA، موازنة كتلية لعقدة المنيل." },
  { id:"ismailia_new", name:"ترعة الإسماعيلية (الجديدة)", tag:"ISM·NEW",
    url:"https://mohseno2002.github.io/ismailia-canal/",
    icon:"canal", c1:"#1c8ca0", c2:"#0c4a55",
    desc:"نموذج هيدروليكي محدّث: منحنيات تصريف معايرة وخريطة شبكة تفاعلية." },
  { id:"ismailia_old", name:"ترعة الإسماعيلية (القديمة)", tag:"ISM·DT",
    url:"https://mohseno2002.github.io/ismailia-dt/",
    icon:"canal", c1:"#2a7d8c", c2:"#123c44",
    desc:"الإصدار المرجعي السابق للوحة التحكم الهيدروليكية للإسماعيلية." },
  { id:"suez", name:"التوأم الرقمي لترعة السويس", tag:"SUEZ",
    url:"https://mohseno2002.github.io/suez-canal-dt/",
    icon:"pipe", c1:"#0e7a6e", c2:"#073e39",
    desc:"سريان بالأنابيب للترع المغطاة، تصحيح موازنة منيِّف، محرك GVF محسّن." },
  { id:"giza", name:"لوحة ري الجيزة", tag:"GIZA",
    url:"https://mohseno2002.github.io/Giza-/",
    icon:"grid", c1:"#0e3b5c", c2:"#06243a",
    desc:"بيانات حيّة، بطاقات Manning الهيدروليكية، ومتابعة مناوبات العمالة." },
  { id:"tired", name:"سجل الترع المتعبة", tag:"REGISTRY",
    url:"https://mohseno2002.github.io/tired-canals/",
    icon:"clipboard", c1:"#9c5a2c", c2:"#4f2c13",
    desc:"سجل جمهوري: استبيان متعدد النماذج ومساعد ذكاء عربي محلي." }
];

var ICONS = {
  wave:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8c2.5-2 5-2 7.5 0S14.5 10 17 8s5-2 5 0M2 14c2.5-2 5-2 7.5 0s5 2 7.5 0 5-2 5 0M2 20c2.5-2 5-2 7.5 0s5 2 7.5 0"/></svg>',
  canal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6v12M21 6v12M3 18c3-2 6-2 9 0s6 2 9 0M3 13c3-2 6-2 9 0s6 2 9 0"/></svg>',
  pipe:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="9" width="20" height="6" rx="3"/><path d="M7 9V6M17 15v3"/></svg>',
  grid:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
  clipboard:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4V3h6v1M9 11h6M9 15h4"/></svg>',
  enter:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 6l-6 6 6 6M5 12h14"/></svg>',
  pop:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6M20 4l-9 9M19 13v6H5V5h6"/></svg>'
};

function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}

/* ===== Render grid ===== */
function renderGrid(){
  var g=document.getElementById("grid"); g.innerHTML="";
  APPS.forEach(function(a){
    var tile=el("div","tile");
    tile.style.setProperty("--gw","rgba(63,208,224,.18)");
    tile.appendChild(el("div","t-glow"));
    var top=el("div","t-top");
    var ico=el("div","t-ico", (ICONS[a.icon]||ICONS.grid)+'<span class="sheen"></span>');
    ico.style.background="linear-gradient(150deg,"+a.c1+","+a.c2+")";
    top.appendChild(ico);
    top.appendChild(el("span","t-tag", a.tag));
    tile.appendChild(top);
    tile.appendChild(el("div","t-name", a.name));
    tile.appendChild(el("div","t-desc", a.desc));
    var foot=el("div","t-foot");
    foot.appendChild(el("span","t-enter", ICONS.enter+"<span>دخول</span>"));
    var pop=el("button","t-pop", ICONS.pop); pop.title="فتح في نافذة منفصلة";
    pop.onclick=function(ev){ ev.stopPropagation(); window.open(a.url,"_blank","noopener"); };
    foot.appendChild(pop);
    tile.appendChild(foot);
    tile.onclick=function(){ openViewer(a); };
    g.appendChild(tile);
  });
  document.getElementById("appCount").textContent = APPS.length + " منظومات";
}

/* ===== Viewer ===== */
var viewer=document.getElementById("viewer");
var vFrame=document.getElementById("vFrame");
var vLoad=document.getElementById("vLoad");
var loadTimer=null;

function openViewer(a){
  document.getElementById("vName").textContent=a.name;
  document.getElementById("vDot").style.background=a.c1;
  document.getElementById("vExt").href=a.url;
  document.getElementById("vLoadLbl").textContent="جارٍ فتح: "+a.name;
  vLoad.classList.remove("hide");
  vFrame.src="about:blank";
  viewer.classList.add("open");
  document.body.style.overflow="hidden";
  history.pushState({viewer:true},"");
  // load after slide-in starts
  setTimeout(function(){ vFrame.src=a.url; }, 120);
  // fallback: hide spinner if onload doesn't fire (cross-origin can be silent)
  clearTimeout(loadTimer);
  loadTimer=setTimeout(function(){ vLoad.classList.add("hide"); }, 4500);
}
vFrame.addEventListener("load", function(){
  if(vFrame.src && vFrame.src!=="about:blank"){ vLoad.classList.add("hide"); clearTimeout(loadTimer); }
});
function closeViewer(){
  viewer.classList.remove("open");
  document.body.style.overflow="";
  setTimeout(function(){ vFrame.src="about:blank"; }, 420);
}
document.getElementById("vBack").onclick=function(){ if(history.state&&history.state.viewer){history.back();}else{closeViewer();} };
window.addEventListener("popstate", function(){ if(viewer.classList.contains("open")) closeViewer(); });

/* ===== Status / clock ===== */
function setConn(){
  var d=document.getElementById("connDot"), t=document.getElementById("connTxt");
  if(navigator.onLine){ d.className="d live"; t.textContent="متصل"; }
  else { d.className="d off"; t.textContent="دون اتصال"; }
}
var AR_DAYS=["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
var AR_MON=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
function tick(){
  var d=new Date();
  document.getElementById("clock").textContent=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
  document.getElementById("dateAr").textContent=AR_DAYS[d.getDay()]+" "+d.getDate()+" "+AR_MON[d.getMonth()];
}

/* ===== Ambient canvas: flowing water particles ===== */
(function(){
  var cv=document.getElementById("fx"); if(!cv) return;
  var ctx=cv.getContext("2d"), W,H,parts=[],raf;
  var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  function size(){ W=cv.width=cv.offsetWidth*devicePixelRatio; H=cv.height=cv.offsetHeight*devicePixelRatio; }
  function init(){
    parts=[]; var n=Math.min(70, Math.floor(W*H/42000));
    for(var i=0;i<n;i++){ parts.push({x:Math.random()*W,y:Math.random()*H,
      r:(Math.random()*1.8+.5)*devicePixelRatio, sp:(Math.random()*.4+.15)*devicePixelRatio,
      a:Math.random()*.5+.15, gold:Math.random()<.35}); }
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<parts.length;i++){ var p=parts[i];
      p.x -= p.sp; p.y += Math.sin((p.x+i*40)/120)*.25*devicePixelRatio;
      if(p.x< -10){ p.x=W+10; p.y=Math.random()*H; }
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.283);
      ctx.fillStyle = p.gold ? "rgba(236,200,99,"+p.a+")" : "rgba(63,208,224,"+p.a+")";
      ctx.fill();
    }
    raf=requestAnimationFrame(draw);
  }
  function start(){ size(); init(); if(!reduce){ cancelAnimationFrame(raf); draw(); } else { draw(); cancelAnimationFrame(raf);} }
  window.addEventListener("resize", function(){ clearTimeout(window.__rz); window.__rz=setTimeout(start,200); });
  start();
})();
